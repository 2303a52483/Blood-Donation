<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }

        .chat-container {
            margin-top: 50px;
        }

        .options button {
            margin: 10px;
            padding: 10px 15px;
            border: none;
            background-color: #ff4d5a;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .response {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>🤖 Ask Me Anything</h2>

    <div class="options">
        <button onclick="reply('donate')">Who can donate to me?</button>
        <button onclick="reply('receive')">Who can I receive from?</button>
        <button onclick="reply('time')">When can I donate again?</button>
    </div>

    <div class="response" id="responseBox"></div>
</div>

<script>
function reply(type) {
    let response = "";

    if(type === "donate") {
        response = "O- can donate to all blood groups.";
    }
    else if(type === "receive") {
        response = "O+ can receive from O+ and O-.";
    }
    else if(type === "time") {
        response = "You can donate blood every 3 months.";
    }

    document.getElementById("responseBox").innerText = response;
}
</script>

</body>
</html>
