<!DOCTYPE html>
<html>
<head>
    <title>Blood Donation Chatbot</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }

        .chat-container {
            margin-top: 50px;
        }

        select, button {
            margin: 10px;
            padding: 10px 15px;
            border: none;
            background-color: #ff4d5a;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .response {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>🤖 Blood Group Chatbot</h2>

    <p>Select your blood group:</p>
    <select id="bloodGroup">
        <option value="">--Choose--</option>
        <option value="O-">O-</option>
        <option value="O+">O+</option>
        <option value="A-">A-</option>
        <option value="A+">A+</option>
        <option value="B-">B-</option>
        <option value="B+">B+</option>
        <option value="AB-">AB-</option>
        <option value="AB+">AB+</option>
    </select>

    <div class="options">
        <button onclick="reply('donate')">Who can donate to me?</button>
        <button onclick="reply('receive')">Who can I receive from?</button>
        <button onclick="reply('time')">When can I donate again?</button>
    </div>

    <div class="response" id="responseBox"></div>
</div>

<script src="script.js"></script>
</body>
</html>
