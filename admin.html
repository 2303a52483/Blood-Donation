<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergency Circle Widget</title>
<style>
/* Emergency Circle Styles */
#emergencyCircle {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 80px;
    height: 80px;
    background: red;
    color: white;
    border-radius: 50%;
    text-align: center;
    line-height: 80px;
    font-weight: bold;
    cursor: pointer;
    z-index: 999;
}
#emergencyPanel {
    display: none;
    position: fixed;
    bottom: 120px;
    right: 30px;
    width: 320px;
    background: #fff;
    border: 2px solid red;
    border-radius: 10px;
    padding: 15px;
    z-index: 1000;
}
#emergencyPanel h3 { margin-top: 0; color: red; }
#emergencyPanel input, #emergencyPanel select, #emergencyPanel button {
    width: 100%;
    padding: 7px;
    margin: 5px 0;
}
#emergencyList {
    max-height: 200px;
    overflow-y: auto;
    border-top: 1px solid #ccc;
    margin-top: 10px;
}
.item { padding: 5px; border-bottom: 1px solid #eee; }
.priority-1 { color: red; font-weight: bold; }
.priority-2 { color: orange; }
.priority-3 { color: green; }
</style>
</head>
<body>

<!-- Emergency Circle -->
<div id="emergencyCircle">⚠️</div>

<!-- Emergency Panel -->
<div id="emergencyPanel">
    <h3>Emergency Requests</h3>

    <!-- Add Member -->
    <input type="text" id="memberName" placeholder="Member Name">
    <input type="text" id="memberBlood" placeholder="Blood Group">
    <select id="memberPriority">
        <option value="1">High Priority</option>
        <option value="2">Medium Priority</option>
        <option value="3">Low Priority</option>
    </select>
    <button id="addMemberBtn">Add Member</button>

    <!-- Emergency List -->
    <div id="emergencyList"></div>

    <!-- Send Alert -->
    <button id="sendAlertBtn" style="background:red; color:white; margin-top:10px;">Send Alert</button>
</div>

<script>
// Toggle Panel
const circle = document.getElementById('emergencyCircle');
const panel = document.getElementById('emergencyPanel');
circle.addEventListener('click', () => {
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
});

// Emergency Data
let emergencies = [];

// Add Member
document.getElementById('addMemberBtn').addEventListener('click', () => {
    const name = document.getElementById('memberName').value.trim();
    const blood = document.getElementById('memberBlood').value.trim();
    const priority = parseInt(document.getElementById('memberPriority').value);
    if(name && blood) {
        emergencies.push({ name, blood, priority });
        emergencies.sort((a,b)=>a.priority-b.priority); // Sort by priority
        updateList();
        document.getElementById('memberName').value = '';
        document.getElementById('memberBlood').value = '';
    }
});

// Update List
function updateList() {
    const list = document.getElementById('emergencyList');
    list.innerHTML = emergencies.map(e => `
        <div class="item priority-${e.priority}">
            ${e.name} (${e.blood}) - Priority: ${e.priority}
            <button onclick="donateBlood('${e.name}')">Donate</button>
        </div>
    `).join('');
}

// Donate Blood
function donateBlood(name) {
    alert(`Blood donation alert sent for ${name}!`);
    emergencies = emergencies.filter(e => e.name !== name);
    updateList();
}

// Send General Alert
document.getElementById('sendAlertBtn').addEventListener('click', () => {
    if(emergencies.length === 0) return alert('No emergencies to alert!');
    alert('Emergency alert sent to all members!');
});
</script>

</body>
</html>
