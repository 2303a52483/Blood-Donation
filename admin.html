<script>

// Helper to get data from multiple possible keys
function getData(keys) {
    for (let key of keys) {
        let data = JSON.parse(localStorage.getItem(key));
        if (data && data.length > 0) {
            return data;
        }
    }
    return [];
}

// SIGNUP COUNT (try different keys)
let users = getData(["users", "signupUsers"]);
document.getElementById("signupCount").innerText = users.length;

// LOGIN COUNT
let logins = getData(["logins", "loginUsers"]);
document.getElementById("loginCount").innerText = logins.length;

// DONORS LIST
let donors = getData(["donors", "circle", "members"]);
let donorHTML = "";

if (donors.length === 0) {
    donorHTML = "<p>No donors found</p>";
} else {
    donors.forEach(d => {
        donorHTML += `<p>❤️ ${d.name} - ${d.blood}</p>`;
    });
}
document.getElementById("donorList").innerHTML = donorHTML;


// REQUESTS LIST (with priority support)
let requests = getData(["requests", "bloodRequests"]);
let requestHTML = "";

if (requests.length === 0) {
    requestHTML = "<p>No requests found</p>";
} else {
    requests.forEach(r => {

        let priorityText = "";
        if (r.priority == 3) priorityText = "🔴 Critical";
        else if (r.priority == 2) priorityText = "🟠 Medium";
        else if (r.priority == 1) priorityText = "🟢 Low";
        else priorityText = "⚪ Normal";

        requestHTML += `<p>🆘 ${r.name} needs ${r.blood} - ${priorityText}</p>`;
    });
}

document.getElementById("requestList").innerHTML = requestHTML;

</script>
