<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Blood Donation Hub</title>
<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
    padding: 0;
}

header {
    background: #e74c3c;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-weight: bold;
}

.container {
    width: 95%;
    max-width: 1000px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 { color: #e74c3c; }

.stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
}

.stats div {
    background: #f8f8f8;
    padding: 15px;
    border-radius: 10px;
    width: 22%;
    text-align: center;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

table, th, td {
    border: 1px solid #ccc;
}

th, td {
    padding: 10px;
    text-align: center;
}

th { background: #f2f2f2; }

button {
    padding: 5px 10px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #c0392b;
}
</style>
</head>
<body>

<header>
    <h1>🩸 Blood Donation Hub - Admin Dashboard</h1>
    <nav>
        <a href="admin.html">Dashboard</a>
        <a href="index.html">User Page</a>
    </nav>
</header>

<div class="container">

    <h2>Statistics</h2>
    <div class="stats">
        <div>
            <h3>Signed Up Users</h3>
            <p id="signedUpCount">0</p>
        </div>
        <div>
            <h3>Logged In Users</h3>
            <p id="loggedInCount">0</p>
        </div>
        <div>
            <h3>Blood Donations</h3>
            <p id="donationCount">0</p>
        </div>
        <div>
            <h3>Blood Requests</h3>
            <p id="requestCount">0</p>
        </div>
    </div>

    <h2>Donors List</h2>
    <table id="donorTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Blood Group</th>
                <th>Donated To</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Patient Requests</h2>
    <table id="patientTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Blood Group</th>
                <th>Priority</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script>
// Admin page reads actual login/sign-up info from localStorage

// Assume your login/signup page saves users like this:
// localStorage.setItem("users", JSON.stringify([
//   {name:"Navya", blood:"A+", signedUp:true, loggedIn:true},
//   {name:"Sushma", blood:"B+", signedUp:true, loggedIn:false}
// ]));

// Assume donors and requests saved as before
// donors = [{name, blood, donatedTo:[]}]
// requests = [{name, blood, priority, time}]

function getUsers() { return JSON.parse(localStorage.getItem("users")) || []; }
function getDonors() { return JSON.parse(localStorage.getItem("donors")) || []; }
function getRequests() { return JSON.parse(localStorage.getItem("requests")) || []; }

function displayStats() {
    const users = getUsers();
    const donors = getDonors();
    const requests = getRequests();

    document.getElementById("signedUpCount").textContent = users.filter(u=>u.signedUp).length;
    document.getElementById("loggedInCount").textContent = users.filter(u=>u.loggedIn).length;
    document.getElementById("donationCount").textContent = donors.reduce((acc,d)=>acc + (d.donatedTo ? d.donatedTo.length:0),0);
    document.getElementById("requestCount").textContent = requests.length;
}

function displayDonors() {
    const donors = getDonors();
    const donorTableBody = document.querySelector("#donorTable tbody");
    donorTableBody.innerHTML = "";
    donors.forEach(d=>{
        const row = document.createElement("tr");
        row.innerHTML = `<td>${d.name}</td><td>${d.blood}</td><td>${d.donatedTo ? d.donatedTo.join(", ") : ""}</td>`;
        donorTableBody.appendChild(row);
    });
}

function displayPatients() {
    const requests = getRequests();
    requests.sort((a,b)=> b.priority - a.priority || a.time - b.time);
    const patientTableBody = document.querySelector("#patientTable tbody");
    patientTableBody.innerHTML = "";
    requests.forEach(r=>{
        const priorityText = r.priority==3?"Critical":r.priority==2?"Medium":"Low";
        const row = document.createElement("tr");
        row.innerHTML = `<td>${r.name}</td><td>${r.blood}</td><td>${priorityText}</td><td>${new Date(r.time).toLocaleString()}</td>`;
        patientTableBody.appendChild(row);
    });
}

// Initial render
displayStats();
displayDonors();
displayPatients();
</script>

</body>
</html>
