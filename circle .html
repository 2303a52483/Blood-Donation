<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergency Blood Circle</title>

<style>
    body {
        font-family: Arial;
        background: linear-gradient(to right, #ff4b5c, #ff7a7a);
        margin: 0;
        padding: 0;
        text-align: center;
        color: white;
    }

    .container {
        background: white;
        color: black;
        width: 350px;
        margin: 50px auto;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
    }

    h1 {
        margin-top: 20px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        width: 95%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #e63e50;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        background: #ffe5e8;
        margin: 5px;
        padding: 10px;
        border-radius: 8px;
    }
</style>
</head>

<body>

<h1>🚨 Emergency Blood Circle</h1>

<div class="container">

    <h3>Add Member</h3>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="blood" placeholder="Blood Group (Ex: O+)">
    <button onclick="addMember()">Add Member</button>

    <hr>

    <h3>Emergency Request</h3>
    <input type="text" id="needBlood" placeholder="Required Blood (Ex: O+)">
    <button onclick="sendAlert()">Send Alert</button>

    <h3>Alert Sent To:</h3>
    <ul id="result"></ul>

</div>

<script>
    function getMembers() {
        return JSON.parse(localStorage.getItem("circle")) || [];
    }

    function saveMembers(data) {
        localStorage.setItem("circle", JSON.stringify(data));
    }

    function addMember() {
        let name = document.getElementById("name").value;
        let blood = document.getElementById("blood").value;

        if(name === "" || blood === "") {
            alert("⚠ Please fill all fields");
            return;
        }

        let members = getMembers();
        members.push({ name, blood });

        saveMembers(members);

        alert("✅ Member added!");

        document.getElementById("name").value = "";
        document.getElementById("blood").value = "";
    }

    function sendAlert() {
        let needBlood = document.getElementById("needBlood").value;

        let members = getMembers();

        let matched = members.filter(m =>
            m.blood === needBlood || m.blood === "O-"
        );

        let list = document.getElementById("result");
        list.innerHTML = "";

        if (matched.length === 0) {
            list.innerHTML = "<li>❌ No members found</li>";
        } else {
            matched.forEach(m => {
                let li = document.createElement("li");
                li.textContent = "🚨 " + m.name + " (" + m.blood + ")";
                list.appendChild(li);
            });
        }
    }
</script>

</body>
</html>
