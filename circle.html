<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blood Priority Queue</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #ff4b5c, #ff7a7a);
    text-align: center;
    color: white;
}

.container {
    background: white;
    color: black;
    width: 350px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 15px;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 95%;
    padding: 10px;
    background: #ff4b5c;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #e63e50;
}

li {
    background: #ffe5e8;
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<h1>🚨 Blood Priority Queue</h1>

<div class="container">

    <h3>Add Emergency Patient</h3>
    <input type="text" id="pname" placeholder="Patient Name">
    <input type="text" id="pblood" placeholder="Blood Group (Ex: O+)">

    <select id="priority">
        <option value="3">🔴 Critical</option>
        <option value="2">🟠 Medium</option>
        <option value="1">🟢 Low</option>
    </select>

    <button onclick="addRequest()">Add Request</button>

    <hr>

    <button onclick="showPriority()">Show Priority Order</button>

    <h3>Donation Order:</h3>
    <ul id="result"></ul>

</div>

<script>

// Get stored data
function getRequests() {
    return JSON.parse(localStorage.getItem("requests")) || [];
}

// Save data
function saveRequests(data) {
    localStorage.setItem("requests", JSON.stringify(data));
}

// Add patient request
function addRequest() {
    let name = document.getElementById("pname").value;
    let blood = document.getElementById("pblood").value;
    let priority = parseInt(document.getElementById("priority").value);

    if(name === "" || blood === "") {
        alert("⚠ Fill all fields");
        return;
    }

    let requests = getRequests();

    requests.push({
        name: name,
        blood: blood,
        priority: priority,
        time: Date.now()
    });

    saveRequests(requests);

    alert("✅ Request Added");

    document.getElementById("pname").value = "";
    document.getElementById("pblood").value = "";
}

// Show priority order
function showPriority() {
    let requests = getRequests();

    // Sort: Priority first, then time
    requests.sort((a, b) => {
        if (b.priority !== a.priority) {
            return b.priority - a.priority;
        }
        return a.time - b.time;
    });

    let list = document.getElementById("result");
    list.innerHTML = "";

    if (requests.length === 0) {
        list.innerHTML = "<li>No requests</li>";
        return;
    }

    requests.forEach((r, index) => {
        let li = document.createElement("li");

        let pText = r.priority == 3 ? "🔴 Critical" :
                    r.priority == 2 ? "🟠 Medium" : "🟢 Low";

        li.textContent =
            (index + 1) + "️⃣ " + r.name +
            " (" + r.blood + ") - " + pText;

        list.appendChild(li);
    });
}

</script>

</body>
</html>
