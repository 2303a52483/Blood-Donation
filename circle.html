<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Donation Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        header {
            background: #e74c3c;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Emergency Circle */
        .circle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: red;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 80px;
            font-weight: bold;
            cursor: pointer;
            z-index: 999;
        }

        .emergency-list {
            display: none;
            position: absolute;
            bottom: 90px;
            right: 0;
            background: white;
            color: black;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .emergency-list .item {
            padding: 5px;
            border-bottom: 1px solid #eee;
        }

        /* Priority colors */
        .priority-1 { color: red; font-weight: bold; }     /* High */
        .priority-2 { color: orange; }                     /* Medium */
        .priority-3 { color: green; }                      /* Low */
    </style>
</head>
<body>

<header>
    <h1>🩸 Blood Donation Hub</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="donate.html">Donate</a>
        <a href="needblood.html">Need Blood</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<!-- Main content -->
<main>
    <h2>Welcome to the Blood Donation Hub</h2>
    <p>Click the emergency circle to see priority-wise blood requests.</p>
</main>

<!-- Emergency Circle -->
<div id="emergencyCircle" class="circle">⚠️</div>
<div id="emergencyList" class="emergency-list"></div>

<script>
    const emergencyCircle = document.getElementById('emergencyCircle');
    const emergencyList = document.getElementById('emergencyList');

    // Sample data - replace with your actual members / emergency requests
    const emergencies = [
        { name: 'John Doe', blood: 'A+', priority: 1 },
        { name: 'Jane Smith', blood: 'B-', priority: 3 },
        { name: 'Alex Ray', blood: 'O+', priority: 2 },
        { name: 'Mary Lee', blood: 'AB+', priority: 1 }
    ];

    // Sort by priority (1 = highest)
    emergencies.sort((a, b) => a.priority - b.priority);

    // Show/hide list on circle click
    emergencyCircle.addEventListener('click', () => {
        emergencyList.style.display = emergencyList.style.display === 'block' ? 'none' : 'block';
    });

    // Populate emergency list
    emergencyList.innerHTML = emergencies.map(e => `
        <div class="item priority-${e.priority}">
            <strong>${e.name}</strong> (${e.blood}) - Priority: ${e.priority}
        </div>
    `).join('');
</script>

</body>
</html>
