<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            background: #f5f5f5;
        }

        h1 { text-align: center; }

        h2 { color: red; }

        .box { 
            border: 1px solid #ccc; 
            padding: 15px; 
            margin: 15px; 
            border-radius: 10px; 
            background: white;
        }

        button {
            padding: 6px 12px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .refresh { background: green; color: white; }
        .clear { background: black; color: white; }

    </style>
</head>

<body>

<h1>🩸 Blood Donation Admin Dashboard</h1>

<div style="text-align:center;">
    <button class="refresh" onclick="loadData()">🔄 Refresh</button>
    <button class="clear" onclick="clearAll()">🗑 Clear All Data</button>
</div>

<div class="box">
    <h2>👤 Total Signed Up Users</h2>
    <p id="signupCount">0</p>
</div>

<div class="box">
    <h2>🔑 Logged In Users</h2>
    <p id="loginCount">0</p>
</div>

<div class="box">
    <h2>❤️ Donors List</h2>
    <div id="donorList">No donors yet</div>
</div>

<div class="box">
    <h2>🆘 Blood Requests</h2>
    <div id="requestList">No requests yet</div>
</div>

<script>

// Safe get function
function getData(key) {
    try {
        return JSON.parse(localStorage.getItem(key)) || [];
    } catch (e) {
        return [];
    }
}

// Load all data
function loadData() {

    // USERS
    let users = getData("users");
    document.getElementById("signupCount").innerText = users.length;

    // LOGINS
    let logins = getData("logins");
    document.getElementById("loginCount").innerText = logins.length;

    // DONORS
    let donors = getData("donors");
    let donorHTML = "";

    if (donors.length === 0) {
        donorHTML = "<p>No donors found</p>";
    } else {
        donors.forEach(d => {
            donorHTML += `<p>❤️ ${d.name} - ${d.blood}</p>`;
        });
    }

    document.getElementById("donorList").innerHTML = donorHTML;


    // REQUESTS
    let requests = getData("requests");
    let requestHTML = "";

    if (requests.length === 0) {
        requestHTML = "<p>No requests found</p>";
    } else {
        requests.forEach(r => {

            let priority =
                r.priority == 3 ? "🔴 Critical" :
                r.priority == 2 ? "🟠 Medium" :
                r.priority == 1 ? "🟢 Low" : "⚪ Normal";

            requestHTML += `<p>🆘 ${r.name} needs ${r.blood} - ${priority}</p>`;
        });
    }

    document.getElementById("requestList").innerHTML = requestHTML;
}

// Clear all data
function clearAll() {
    if (confirm("⚠ Delete all data?")) {
        localStorage.clear();
        loadData();
    }
}

// 🔥 IMPORTANT FIX → load after page fully loads
window.onload = function() {
    loadData();
};

</script>

</body>
</html>
